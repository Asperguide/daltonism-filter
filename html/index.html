<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" sizes="1270x1221" href="./img/AB-logo.png">
    <link rel="icon" type="image/png" sizes="1270x1221" href="./img/AB-logo.png" media="(prefers-color-scheme: dark)">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Local previewer</title>
</head>

<body>
    <div id="c-draggable-menu" class="c-control-menu">
        <p>Drag me!</p>
        <h1>Color Blindness Filters</h1>
        <p>Current filter in use: <span id="c-filter">None</span></p>
        <div id="c-button-container">
            <button id="normal">Normal</button>
            <button id="deuteranopia">Deuteranopia</button>
            <button id="protanopia">Protanopia</button>
            <button id="tritanopia">Tritanopia</button>
            <button id="monochromacy">Monochromacy</button>
        </div>
        <br>
        <div>
            <label for="intensity">Filter Intensity: </label>
            <input type="range" id="intensity-slider" name="intensity" min="0" max="100" value="100">
            <span id="intensity-value">...</span>
        </div>
        <br>
        <div>
            <label for="transparency">Filter Transparency: </label>
            <input type="range" id="transparency-slider" name="transparency" min="20" max="100" value="100">
            <span id="transparency-value">...</span>
        </div>
        <br>
    </div>
    <div id="content-loader">
        <h2>Load Content for Testing</h2>
        <div>
            <label for="url-input">Enter URL to load in iframe:</label>
            <input type="url" id="url-input" placeholder="https://example.com">
            <button id="load-url-btn">Load URL</button>
        </div>
        <div>
            <label for="file-input">Upload File:</label>
            <input type="file" id="file-input">
            <button id="load-file-btn">Load File</button>
        </div>
        <div>
            <label for="image-input">Upload Image:</label>
            <input type="file" id="image-input" accept="image/*">
            <button id="load-image-btn">Load Image</button>
        </div>
    </div>
    <div id="content-display">
        <iframe id="content-iframe" style="width:100%; border:1px solid #ccc;"></iframe>
        <img id="content-image" style="max-width:100%; display:none;" alt="Uploaded image">
    </div>
    <script type="text/JavaScript" src="./js/daltonism.js"></script>
    <script type="text/JavaScript" src="./js/script.js"></script>
</body>

</html>
